<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — FreshlyMarket</title>
<meta name="description" content="View and manage your saved wishlist products at FreshlyMarket.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/header-footer.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>
<header id="main-header"></header>

<div class="page-header">
  <div class="container">
    <h1>My Wishlist</h1>
    <p>Products you've saved for later.</p>
  </div>
</div>
<div class="breadcrumb-bar">
  <div class="container crumbs">
    <a href="index.html">Home</a>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    <span class="current">Wishlist</span>
  </div>
</div>

<section>
  <div class="container">
    <div class="row-between reveal" style="margin-bottom:1.5rem;">
      <span class="fs-sm" style="color:var(--text-secondary);"><strong id="wishCount">3</strong> items saved</span>
      <button class="btn btn-primary btn-sm" onclick="alert('All wishlist items added to cart!')">Add All to Cart</button>
    </div>
    <div class="grid grid-3 stagger" id="wishlistGrid"></div>
  </div>
</section>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/products-data.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
  if (window.FM_PRODUCTS && window.FM_renderProductCard){
    const saved = window.FM_PRODUCTS.slice(0,3);
    document.getElementById("wishlistGrid").innerHTML = saved.map(p => window.FM_renderProductCard(p,false)).join("");
    document.getElementById("wishCount").textContent = saved.length;
  }
});
</script>
</body>
</html>
