<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — FreshlyMarket</title>
<meta name="description" content="Create your FreshlyMarket account to start shopping fresh groceries online.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/header-footer.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>
<header id="main-header"></header>

<div class="auth-shell">
  <div class="auth-card reveal">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></div>
    <h1>Create Your Account</h1>
    <p class="auth-sub">Join free and start saving on weekly groceries today.</p>

    <form onsubmit="event.preventDefault(); window.location.href='login.html';">
      <div class="grid grid-2" style="gap:1rem;">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" required placeholder="John"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" required placeholder="Doe"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" class="form-control" required placeholder="you@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" class="form-control" required placeholder="Create a password">
        </div>
      </div>
      <label class="form-check" style="margin-bottom:1.25rem;"><input type="checkbox" required> I agree to the Terms of Service and Privacy Policy</label>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>

    <div class="auth-divider">or sign up with</div>
    <div class="social-auth">
      <button type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.8 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.5c-.2 1.3-1 2.4-2.1 3.1v2.6h3.4c2-1.8 3-4.5 3-7.6z"/><path d="M12 22c2.7 0 5-.9 6.7-2.4l-3.4-2.6c-.9.6-2 1-3.3 1-2.5 0-4.6-1.7-5.4-4H3.1v2.6C4.8 19.7 8.1 22 12 22z"/></svg>Google</button>
      <button type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 9H16V6h-2.5C11.6 6 10 7.6 10 9.5V11H8v3h2v7h3v-7h2.2l.8-3H13v-1.2c0-.5.3-.8.7-.8z"/></svg>Facebook</button>
    </div>

    <p class="fs-sm" style="text-align:center;margin-top:1.5rem;">Already have an account? <a href="login.html" class="text-primary-c fw-semibold">Log in</a></p>
  </div>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
