<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — FreshlyMarket</title>
<meta name="description" content="Reset your FreshlyMarket account password.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/header-footer.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>
<header id="main-header"></header>

<div class="auth-shell">
  <div class="auth-card reveal">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1.5"/></svg></div>
    <h1>Reset Your Password</h1>
    <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>

    <form id="resetForm" onsubmit="event.preventDefault(); document.getElementById('resetForm').style.display='none'; document.getElementById('resetSuccess').style.display='block';">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" class="form-control" required placeholder="you@example.com">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
    </form>

    <div id="resetSuccess" style="display:none;text-align:center;">
      <div class="icon-circle" style="margin:0 auto 1rem;width:64px;height:64px;background:var(--color-primary-light);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h3>Check Your Inbox</h3>
      <p class="fs-sm">We've sent a password reset link to your email address.</p>
    </div>

    <p class="fs-sm" style="text-align:center;margin-top:1.5rem;">Remembered your password? <a href="login.html" class="text-primary-c fw-semibold">Log in</a></p>
  </div>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
