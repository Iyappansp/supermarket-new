<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FreshlyMarket</title>
<meta name="description" content="Log in to your FreshlyMarket account to manage orders, wishlist and shopping lists.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/header-footer.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card reveal">
    <a href="index.html" class="auth-icon" aria-label="Go to Homepage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l1.5 5M18 2l-1.5 5M3.5 7h17l-1.6 9.4a2 2 0 0 1-2 1.6H7.1a2 2 0 0 1-2-1.6L3.5 7z"/></svg></a>
    <h1>Welcome Back</h1>
    <p class="auth-sub">Log in to manage your orders, lists, and saved products.</p>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard/index.html';">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" class="form-control" required placeholder="you@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" class="form-control" required placeholder="••••••••">
        </div>
      </div>
      <div class="row-between" style="margin-bottom:1.25rem;">
        <label class="form-check"><input type="checkbox"> Remember me</label>
        <a href="forgot-password.html" class="fs-sm text-primary-c fw-semibold">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
    </form>

    <div class="auth-divider">or continue with</div>
    <div class="social-auth">
      <button type="button">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.86-4.53-5.84-4.53z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        Google
      </button>
      <button type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
      <button type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.66 2.45-3 2.47-1.34.02-1.77-.8-3.29-.8-1.53 0-2 .77-3.28.82-1.31.05-2.3-.78-3.14-1.99-1.71-2.53-3.02-7.08-1.26-10.14.87-1.52 2.39-2.48 4.02-2.5 1.34-.02 2.5.89 3.32.89.82 0 2.21-1.07 3.73-1.07.64 0 2.87.13 4.31 2.21-.11.07-2.57 1.5-2.55 4.54.02 3.52 3.1 4.7 3.23 4.75-.03.11-.53 1.83-1.77 3.63zM13.68 3.59c.73-.87 1.22-2.08 1.08-3.29-1.05.04-2.32.7-3.06 1.58-.67.79-1.25 2.03-1.08 3.21 1.17.09 2.41-.62 3.06-1.5z"/>
        </svg>
        Apple
      </button>
    </div>

    <p class="fs-sm" style="text-align:center;margin-top:1.5rem;">Don't have an account? <a href="signup.html" class="text-primary-c fw-semibold">Sign up free</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
