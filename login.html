<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FreshlyMarket</title>
<meta name="description" content="Log in to your FreshlyMarket account to manage orders, wishlist and shopping lists.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/header-footer.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>
<header id="main-header"></header>

<div class="auth-shell">
  <div class="auth-card reveal">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l1.5 5M18 2l-1.5 5M3.5 7h17l-1.6 9.4a2 2 0 0 1-2 1.6H7.1a2 2 0 0 1-2-1.6L3.5 7z"/></svg></div>
    <h1>Welcome Back</h1>
    <p class="auth-sub">Log in to manage your orders, lists, and saved products.</p>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard/index.html';">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" class="form-control" required placeholder="you@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" class="form-control" required placeholder="••••••••">
        </div>
      </div>
      <div class="row-between" style="margin-bottom:1.25rem;">
        <label class="form-check"><input type="checkbox"> Remember me</label>
        <a href="forgot-password.html" class="fs-sm text-primary-c fw-semibold">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
    </form>

    <div class="auth-divider">or continue with</div>
    <div class="social-auth">
      <button type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.8 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.5c-.2 1.3-1 2.4-2.1 3.1v2.6h3.4c2-1.8 3-4.5 3-7.6z"/><path d="M12 22c2.7 0 5-.9 6.7-2.4l-3.4-2.6c-.9.6-2 1-3.3 1-2.5 0-4.6-1.7-5.4-4H3.1v2.6C4.8 19.7 8.1 22 12 22z"/><path d="M6.6 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.4H3.1A10 10 0 0 0 2 12c0 1.6.4 3.2 1.1 4.6z"/><path d="M12 6c1.5 0 2.7.5 3.7 1.4l3-3C16.9 2.7 14.6 2 12 2 8.1 2 4.8 4.3 3.1 7.4l3.5 2.6C7.4 7.7 9.5 6 12 6z"/></svg>Google</button>
      <button type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 9H16V6h-2.5C11.6 6 10 7.6 10 9.5V11H8v3h2v7h3v-7h2.2l.8-3H13v-1.2c0-.5.3-.8.7-.8z"/></svg>Facebook</button>
    </div>

    <p class="fs-sm" style="text-align:center;margin-top:1.5rem;">Don't have an account? <a href="signup.html" class="text-primary-c fw-semibold">Sign up free</a></p>
  </div>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
