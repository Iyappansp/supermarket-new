<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Products — My Dashboard — FreshlyMarket</title>
<meta name="description" content="View and manage your saved favorite products.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/header-footer.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/dashboard-responsive.css">
</head>
<body>
<header id="main-header"></header>

<div class="dashboard-layout">
  <aside id="dashboard-sidebar"></aside>

  <main class="dash-main">
    <button class="dash-mobile-toggle" id="dashMobileToggle" aria-label="Open dashboard menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <div class="dash-header-row reveal">
      <div><h1>Saved Products</h1><p style="color:var(--text-secondary);">Your favorite products, saved for quick reordering.</p></div>
      <div class="row-center" style="gap:.6rem;">
        <select class="form-control" style="width:auto;" aria-label="Filter by department">
          <option>All Departments</option>
          <option>Fresh Produce</option>
          <option>Dairy</option>
          <option>Bakery</option>
          <option>Household</option>
        </select>
      </div>
    </div>

    <div class="grid grid-3 stagger" id="savedProductsGrid"></div>

    <div class="empty-state" id="savedEmptyState" style="display:none;">
      <img src="../assets/images/empty-wishlist.png" alt="No saved products">
      <h3>No Saved Products Yet</h3>
      <p>Tap the heart icon on any product to save it here for quick access.</p>
      <a href="../grocery.html" class="btn btn-primary">Browse Products</a>
    </div>
  </main>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/animations.js"></script>
<script src="../assets/js/products-data.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
  if (window.FM_PRODUCTS && window.FM_renderProductCard){
    const saved = window.FM_PRODUCTS.slice(2,11).map(p => ({...p, img: "../" + p.img}));
    if (saved.length){
      document.getElementById("savedProductsGrid").innerHTML = saved.map(p => window.FM_renderProductCard(p,false)).join("");
    } else {
      document.getElementById("savedProductsGrid").style.display = "none";
      document.getElementById("savedEmptyState").style.display = "block";
    }
  }
});
</script>
</body>
</html>
