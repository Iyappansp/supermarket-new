<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — My Dashboard — FreshlyMarket</title>
<meta name="description" content="Manage your personal details and account preferences.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/header-footer.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/dashboard-responsive.css">
</head>
<body>
<header id="main-header"></header>

<div class="dashboard-layout">
  <aside id="dashboard-sidebar"></aside>

  <main class="dash-main">
    <button class="dash-mobile-toggle" id="dashMobileToggle" aria-label="Open dashboard menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <div class="dash-header-row reveal">
      <div><h1>My Profile</h1><p style="color:var(--text-secondary);">Manage your personal details and preferences.</p></div>
    </div>

    <div class="dash-content-grid">
      <div>
        <div class="profile-section reveal">
          <h3>Personal Details</h3>
          <div class="avatar-upload">
            <div class="avatar-lg" style="padding:0;overflow:hidden;"><img src="assets/images/user-avatar.png" alt="Jordan Davis" style="width:100%;height:100%;object-fit:cover;"></div>
            <div>
              <button class="btn btn-outline btn-sm">Upload Photo</button>
              <p class="fs-sm" style="margin:.5rem 0 0;color:var(--text-secondary);">JPG or PNG, max 2MB.</p>
            </div>
          </div>
          <form onsubmit="event.preventDefault(); alert('Profile updated successfully!');">
            <div class="grid grid-2">
              <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" value="Jordan" placeholder="First Name"></div>
              <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" value="Davis" placeholder="Last Name"></div>
            </div>
            <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" value="jordan.davis@example.com" placeholder="Email Address"></div>
            <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-control" value="+1 (555) 123-4567" placeholder="Phone Number"></div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="profile-section reveal">
          <h3>Change Password</h3>
          <form onsubmit="event.preventDefault(); alert('Password updated successfully!'); this.reset();">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <div class="password-input-wrap">
                <input type="password" class="form-control" placeholder="••••••••">
                <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <div class="grid grid-2">
              <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="password-input-wrap">
                  <input type="password" class="form-control" placeholder="••••••••">
                  <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="password-input-wrap">
                  <input type="password" class="form-control" placeholder="••••••••">
                  <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  </button>
                </div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>
      </div>

      <div>
        <div class="profile-section reveal">
          <h3>Preferences</h3>
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <label class="row-between" style="cursor:pointer;"><span class="fs-sm">Order updates via email</span><input type="checkbox" checked style="width:18px;height:18px;accent-color:var(--color-primary);"></label>
            <label class="row-between" style="cursor:pointer;"><span class="fs-sm">SMS delivery notifications</span><input type="checkbox" checked style="width:18px;height:18px;accent-color:var(--color-primary);"></label>
            <label class="row-between" style="cursor:pointer;"><span class="fs-sm">Weekly deals newsletter</span><input type="checkbox" style="width:18px;height:18px;accent-color:var(--color-primary);"></label>
            <label class="row-between" style="cursor:pointer;"><span class="fs-sm">Personalized recommendations</span><input type="checkbox" checked style="width:18px;height:18px;accent-color:var(--color-primary);"></label>
          </div>
        </div>

        <div class="profile-section reveal">
          <h3>Membership</h3>
          <div class="row-between" style="margin-bottom:1rem;">
            <span class="fs-sm">Current Tier</span>
            <span class="badge badge-off">Gold Member</span>
          </div>
          <div class="row-between" style="margin-bottom:.5rem;">
            <span class="fs-sm" style="color:var(--text-secondary);">Reward Points</span>
            <strong>2,480 pts</strong>
          </div>
          <div style="height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin-bottom:1rem;">
            <div style="width:62%;height:100%;background:var(--color-primary);"></div>
          </div>
          <p class="fs-sm" style="color:var(--text-secondary);">620 points to Platinum Tier</p>
        </div>
      </div>
    </div>
  </main>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/animations.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
