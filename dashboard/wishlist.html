<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — My Dashboard — FreshlyMarket</title>
<meta name="description" content="View and manage your saved wishlist products.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/header-footer.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/dashboard-responsive.css">
</head>
<body>
<header id="main-header"></header>

<div class="dashboard-layout">
  <aside id="dashboard-sidebar"></aside>

  <main class="dash-main">
    <button class="dash-mobile-toggle" id="dashMobileToggle" aria-label="Open dashboard menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <div class="dash-header-row reveal">
      <div><h1>My Wishlist</h1><p style="color:var(--text-secondary);">Products you've saved for later.</p></div>
      <button class="btn btn-primary" onclick="alert('All wishlist items added to cart!')">Add All to Cart</button>
    </div>

    <div class="grid grid-3 stagger" id="dashWishlistGrid"></div>
  </main>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/animations.js"></script>
<script src="../assets/js/products-data.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
  if (window.FM_PRODUCTS && window.FM_renderProductCard){
    // products-data.js uses "assets/images/" — adjust prefix and use unique generated alt assets
    const altImages = {
      1: "../assets/images/p-apple-alt.png",
      2: "../assets/images/p-carrot-alt.png",
      3: "../assets/images/p-broccoli-alt.png",
      4: "../assets/images/p-bread-alt.png",
      5: "../assets/images/p-milk-alt.png",
      6: "../assets/images/p-cheese-alt.png"
    };
    const saved = window.FM_PRODUCTS.slice(0,6).map(p => ({
      ...p,
      img: altImages[p.id] || ("../" + p.img)
    }));
    document.getElementById("dashWishlistGrid").innerHTML = saved.map(p => window.FM_renderProductCard(p,false)).join("");
  }
});
</script>
</body>
</html>
